name: Rodar notebook de teste

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rodar-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute ida-etl-logcomex.ipynb \
            --output teste_modelo_executado.ipynb

      - name: Publicar resultado
        uses: actions/upload-artifact@v4
        with:
          name: notebook-executado
          path: teste_modelo_executado.ipynb
